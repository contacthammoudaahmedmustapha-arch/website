
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>METTEC 3D MAP — Groupe Bayoudh Métal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#020d1a;font-family:'Segoe UI','Helvetica Neue',Arial,sans-serif}
canvas{display:block}
#loading{position:fixed;inset:0;background:#020d1a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:9999;transition:opacity .8s}
#loading.fade{opacity:0;pointer-events:none}
.ld-title{font-size:72px;font-weight:900;letter-spacing:.2em;background:linear-gradient(135deg,#f9ea43,#9e6c0a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ld-sub{font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:#2a4a6a}
.ld-progress{width:220px;height:2px;background:rgba(245,218,26,.1);border-radius:2px;overflow:hidden;margin-top:6px}
.ld-fill{height:100%;background:linear-gradient(90deg,#f5da1a,#c69808);width:0;transition:width .4s}
.ld-dots{display:flex;gap:6px;margin-top:4px}
.ld-dot{width:4px;height:4px;border-radius:50%;background:#f5da1a;animation:ld 1.4s ease-in-out infinite}
.ld-dot:nth-child(2){animation-delay:.2s}.ld-dot:nth-child(3){animation-delay:.4s}
@keyframes ld{0%,100%{opacity:.2;transform:scale(1)}50%{opacity:1;transform:scale(1.4)}}
.ld-err{font-size:12px;color:#ff6655;letter-spacing:.08em;display:none;margin-top:4px;text-align:center;max-width:300px}
#top{position:fixed;top:0;left:0;right:0;height:62px;display:flex;align-items:center;justify-content:space-between;padding:0 22px;z-index:200;background:rgba(2,13,26,.82);backdrop-filter:blur(22px);border-bottom:1px solid rgba(245,218,26,.12)}
.logo-row{display:flex;align-items:center;gap:12px}
.hex{width:36px;height:36px;background:linear-gradient(135deg,#f5da1a,#9e6c0a);clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;color:#020d1a;flex-shrink:0}
.logo-name{font-weight:900;font-size:22px;color:#fff}
.logo-name em{color:#f5da1a;font-style:normal}
.map-badge{background:rgba(245,218,26,.12);border:1px solid rgba(245,218,26,.3);border-radius:20px;padding:3px 14px;font-size:10px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:#f5da1a}
.top-right{display:flex;align-items:center;gap:8px}
.hbtn{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:8px;padding:7px 16px;font-size:12px;font-weight:500;letter-spacing:.1em;color:#5a7a9a;cursor:pointer;transition:all .2s}
.hbtn:hover{background:rgba(245,218,26,.1);border-color:rgba(245,218,26,.3);color:#f5da1a}
.hbtn.on{background:rgba(245,218,26,.12);border-color:rgba(245,218,26,.35);color:#f5da1a}
#timebox{position:fixed;top:74px;left:22px;z-index:200;background:rgba(2,13,26,.8);backdrop-filter:blur(16px);border:1px solid rgba(245,218,26,.12);border-radius:12px;padding:10px 16px}
.time-n{font-size:22px;font-weight:700;color:#fff;line-height:1}
.time-l{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:#3a5a7a;margin-top:2px}
#weather{position:fixed;top:74px;right:22px;z-index:200;background:rgba(2,13,26,.8);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:10px 16px;display:flex;align-items:center;gap:10px}
.wx-icon{font-size:22px}.wx-n{font-size:18px;font-weight:700;color:#fff}.wx-l{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:#3a5a7a}
.blabel{position:fixed;pointer-events:none;transform:translate(-50%,-50%);z-index:150;text-align:center;transition:opacity .3s}
.bldot{width:7px;height:7px;border-radius:50%;margin:0 auto 5px;animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1;box-shadow:0 0 4px currentColor}50%{opacity:.4;box-shadow:none}}
.blname{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;white-space:nowrap;background:rgba(2,13,26,.72);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:5px 14px;color:#c8daf0;transition:all .25s;cursor:pointer;pointer-events:all}
.blname:hover,.blname.hl{background:rgba(245,218,26,.15);border-color:rgba(245,218,26,.45);color:#f5da1a}
#legend{position:fixed;bottom:22px;left:22px;z-index:200;background:rgba(2,13,26,.85);backdrop-filter:blur(18px);border:1px solid rgba(245,218,26,.1);border-radius:14px;padding:16px 18px;min-width:200px}
.leg-title{font-size:9px;font-weight:700;letter-spacing:.24em;text-transform:uppercase;color:#f5da1a;margin-bottom:13px}
.leg-item{display:flex;align-items:center;gap:10px;margin-bottom:9px;cursor:pointer;transition:all .2s}
.leg-item:last-child{margin-bottom:0}.leg-item:hover .leg-lbl{color:#fff}
.leg-sq{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.leg-lbl{font-size:12px;color:#5a7a9a;font-weight:400}
#hints{position:fixed;bottom:22px;right:22px;z-index:200;background:rgba(2,13,26,.75);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:10px 14px;font-size:11px;color:#3a5a7a;line-height:2}
#hints span{color:#5a8aaa}
#minimap{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:200;background:rgba(2,13,26,.85);backdrop-filter:blur(16px);border:1px solid rgba(245,218,26,.12);border-radius:12px;padding:8px 12px;display:flex;align-items:center;gap:6px}
.mm-dot{width:8px;height:8px;border-radius:2px;cursor:pointer;transition:transform .2s}.mm-dot:hover{transform:scale(1.4)}
.mm-sep{width:1px;height:14px;background:rgba(255,255,255,.07)}
#panel{position:fixed;right:0;top:62px;bottom:0;width:390px;background:rgba(2,13,26,.94);backdrop-filter:blur(28px) saturate(1.6);border-left:1px solid rgba(245,218,26,.14);z-index:300;transform:translateX(100%);transition:transform .45s cubic-bezier(.4,0,.2,1);overflow-y:auto;padding:28px 26px 40px}
#panel.open{transform:translateX(0)}
.p-close{position:absolute;top:14px;right:14px;width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#5a7a9a;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.p-close:hover{background:rgba(245,218,26,.15);color:#f5da1a;border-color:rgba(245,218,26,.35)}
.p-emoji{font-size:44px;margin-bottom:16px}.p-tag{font-size:10px;font-weight:700;letter-spacing:.26em;text-transform:uppercase;color:#f5da1a;margin-bottom:7px}
.p-title{font-size:28px;font-weight:900;color:#fff;line-height:1.1;margin-bottom:4px}
.p-sub{font-size:13px;color:#3a6080;margin-bottom:22px}
.p-div{height:1px;background:rgba(255,255,255,.07);margin:18px 0}
.p-desc{font-size:14px;line-height:1.82;color:#5a7a9a;margin-bottom:20px}
.p-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px}
.pstat{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:14px 12px}
.pstat-v{font-size:24px;font-weight:900;background:linear-gradient(135deg,#f9ea43,#c69808);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.pstat-l{font-size:10px;color:#3a6080;margin-top:3px}
.p-sect{font-size:9px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:#2a4a6a;margin:16px 0 10px}
.p-row{display:flex;align-items:center;gap:11px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);border-radius:10px;padding:11px 13px;margin-bottom:7px}
.p-row-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}.p-row-n{font-size:13px;color:#9ab8d0}
.p-floor{background:rgba(255,255,255,.03);border-radius:12px;padding:14px 15px;margin-bottom:9px;border-left:3px solid transparent}
.pf-floor{font-size:9px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;margin-bottom:5px}
.pf-name{font-size:15px;font-weight:700;color:#fff;margin-bottom:4px}.pf-desc{font-size:12px;color:#3a6080;line-height:1.65}
.p-cta{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;background:linear-gradient(135deg,#f5da1a,#c69808);color:#020d1a;font-weight:800;font-size:12px;letter-spacing:.16em;text-transform:uppercase;padding:17px;border-radius:12px;border:none;cursor:pointer;margin-top:22px;text-decoration:none;transition:opacity .2s,transform .2s}
.p-cta:hover{opacity:.9;transform:translateY(-1px)}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(245,218,26,.25);border-radius:2px}
body{cursor:none}
#cur{width:8px;height:8px;background:#f5da1a;border-radius:50%;position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .2s,height .2s}
#cur-r{width:28px;height:28px;border:1.5px solid rgba(245,218,26,.5);border-radius:50%;position:fixed;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .25s,height .25s,opacity .25s}
#cur.big{width:14px;height:14px}#cur-r.big{width:46px;height:46px;opacity:.3}
</style>
</head>
<body>
<div id="cur"></div><div id="cur-r"></div>
<div id="loading">
  <div class="ld-title">METTEC</div>
  <div class="ld-sub">Chargement de la carte 3D...</div>
  <div class="ld-progress"><div class="ld-fill" id="ldfill"></div></div>
  <div class="ld-dots"><div class="ld-dot"></div><div class="ld-dot"></div><div class="ld-dot"></div></div>
  <div class="ld-err" id="lderr"></div>
</div>
<canvas id="c"></canvas>
<div id="top">
  <div class="logo-row">
    <div class="hex">M</div>
    <div><div class="logo-name">MET<em>TEC</em></div></div>
    <div class="map-badge">3D Map</div>
  </div>
  <div class="top-right">
    <button class="hbtn" id="btnReset" onclick="resetCam()">⟳ Vue initiale</button>
    <button class="hbtn" id="btnAuto" onclick="toggleAuto()">◉ Auto-rotation</button>
    <button class="hbtn" onclick="document.getElementById('panel').classList.remove('open')">← Fermer</button>
  </div>
</div>
<div id="timebox"><div class="time-n" id="timedisp">--:--</div><div class="time-l">Monastir, TN</div></div>
<div id="weather"><div class="wx-icon">🌙</div><div><div class="wx-n">24°C</div><div class="wx-l">Ciel dégagé</div></div></div>
<div id="lbls"></div>
<div id="panel"><button class="p-close" onclick="closePanel()">✕</button><div id="pcontent"></div></div>
<div id="legend">
  <div class="leg-title">Ateliers METTEC</div>
  <div class="leg-item" onclick="focusOn('production')"><div class="leg-sq" style="background:#f5da1a"></div><span class="leg-lbl">🏭 Production</span></div>
  <div class="leg-item" onclick="focusOn('soudeurs')"><div class="leg-sq" style="background:#ff8c00"></div><span class="leg-lbl">⚡ Soudure</span></div>
  <div class="leg-item" onclick="focusOn('menuisiers')"><div class="leg-sq" style="background:#e5c20d"></div><span class="leg-lbl">🔧 Menuiserie</span></div>
  <div class="leg-item" onclick="focusOn('controle')"><div class="leg-sq" style="background:#00cc88"></div><span class="leg-lbl">✅ Contrôle Qualité</span></div>
  <div class="leg-item" onclick="focusOn('admin')"><div class="leg-sq" style="background:#4a9eff"></div><span class="leg-lbl">🏢 Administration</span></div>
</div>
<div id="minimap">
  <div class="mm-dot" style="background:#f5da1a" onclick="focusOn('production')"></div><div class="mm-sep"></div>
  <div class="mm-dot" style="background:#ff8c00" onclick="focusOn('soudeurs')"></div><div class="mm-sep"></div>
  <div class="mm-dot" style="background:#e5c20d" onclick="focusOn('menuisiers')"></div><div class="mm-sep"></div>
  <div class="mm-dot" style="background:#00cc88" onclick="focusOn('controle')"></div><div class="mm-sep"></div>
  <div class="mm-dot" style="background:#4a9eff" onclick="focusOn('admin')"></div>
</div>
<div id="hints"><span>🖱 Drag</span> orbiter &nbsp;·&nbsp; <span>⚙ Scroll</span> zoom &nbsp;·&nbsp; <span>Click</span> explorer</div>

<!-- TOUT dans un seul bloc script : chargement Three.js + logique app -->
<script>
(function(){
  // ── LOADER PROGRESS ─────────────────────────────────────
  var fill = document.getElementById('ldfill');
  var errEl = document.getElementById('lderr');
  var prog = 0;
  var iv = setInterval(function(){
    prog += 4 + Math.random()*8;
    if(prog >= 82){ prog = 82; clearInterval(iv); }
    fill.style.width = prog + '%';
  }, 90);

  function hideLoader(){
    clearInterval(iv);
    fill.style.width = '100%';
    setTimeout(function(){
      var l = document.getElementById('loading');
      l.classList.add('fade');
      setTimeout(function(){ l.style.display='none'; }, 900);
    }, 350);
  }

  function showError(msg){
    clearInterval(iv);
    errEl.textContent = msg;
    errEl.style.display = 'block';
  }

  // Failsafe : ferme le loader après 20s quoi qu'il arrive
  var failsafe = setTimeout(function(){ hideLoader(); }, 20000);

  // ── CHARGER THREE.JS DYNAMIQUEMENT ──────────────────────
  var s = document.createElement('script');
  s.src = 'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js';
  s.onload = function(){
    clearTimeout(failsafe);
    try {
      startApp();
      hideLoader();
    } catch(e) {
      showError('⚠ Erreur: ' + e.message);
      console.error(e);
    }
  };
  s.onerror = function(){
    clearTimeout(failsafe);
    showError('⚠ Impossible de charger Three.js — vérifiez votre connexion internet.');
  };
  document.head.appendChild(s);

  // ══════════════════════════════════════════════════════════
  // APP PRINCIPALE
  // ══════════════════════════════════════════════════════════
  function startApp(){

    // ── CURSOR ────────────────────────────────────────────
    var cur=document.getElementById('cur'), curR=document.getElementById('cur-r');
    var mx=0,my=0,rx=0,ry=0;
    document.addEventListener('mousemove',function(e){mx=e.clientX;my=e.clientY;});
    (function ck(){
      cur.style.left=mx+'px'; cur.style.top=my+'px';
      rx+=(mx-rx)*.12; ry+=(my-ry)*.12;
      curR.style.left=rx+'px'; curR.style.top=ry+'px';
      requestAnimationFrame(ck);
    })();
    document.querySelectorAll('button,a,.hbtn,.leg-item,.blname,.mm-dot,.p-close,.p-cta').forEach(function(el){
      el.addEventListener('mouseenter',function(){cur.classList.add('big');curR.classList.add('big');});
      el.addEventListener('mouseleave',function(){cur.classList.remove('big');curR.classList.remove('big');});
    });

    // ── RENDERER ──────────────────────────────────────────
    var W=window.innerWidth, H=window.innerHeight;
    var canvas=document.getElementById('c');
    var renderer=new THREE.WebGLRenderer({canvas:canvas,antialias:true});
    renderer.setSize(W,H);
    renderer.setPixelRatio(Math.min(devicePixelRatio,2));
    renderer.shadowMap.enabled=true;
    renderer.shadowMap.type=THREE.PCFSoftShadowMap;
    renderer.toneMapping=THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure=0.9;
    window.addEventListener('resize',function(){
      renderer.setSize(window.innerWidth,window.innerHeight);
      cam.aspect=window.innerWidth/window.innerHeight;
      cam.updateProjectionMatrix();
    });

    // ── SCENE ─────────────────────────────────────────────
    var scene=new THREE.Scene();
    scene.background=new THREE.Color(0x020d1a);
    scene.fog=new THREE.FogExp2(0x020d1a,0.015);

    // ── CAMERA ────────────────────────────────────────────
    var cam=new THREE.PerspectiveCamera(52,W/H,0.1,300);
    var sph={theta:Math.PI*0.22,phi:1.05,r:50};
    var tgt={theta:sph.theta,phi:sph.phi,r:sph.r};
    var autoRot=true;

    window.resetCam=function(){ tgt={theta:Math.PI*0.22,phi:1.05,r:50}; };
    window.toggleAuto=function(){ autoRot=!autoRot; document.getElementById('btnAuto').classList.toggle('on',autoRot); };

    // ── CONTROLS ──────────────────────────────────────────
    var dragging=false, pm={x:0,y:0};
    canvas.addEventListener('mousedown',function(e){ dragging=true; pm={x:e.clientX,y:e.clientY}; autoRot=false; document.getElementById('btnAuto').classList.remove('on'); });
    window.addEventListener('mouseup',function(){ dragging=false; });
    window.addEventListener('mousemove',function(e){
      if(!dragging)return;
      tgt.theta-=(e.clientX-pm.x)*0.006;
      tgt.phi=Math.max(.3,Math.min(1.35,tgt.phi+(e.clientY-pm.y)*0.006));
      pm={x:e.clientX,y:e.clientY};
    });
    canvas.addEventListener('wheel',function(e){ tgt.r=Math.max(12,Math.min(80,tgt.r+e.deltaY*.05)); });
    canvas.addEventListener('touchstart',function(e){ dragging=true; pm={x:e.touches[0].clientX,y:e.touches[0].clientY}; autoRot=false; });
    window.addEventListener('touchend',function(){ dragging=false; });
    window.addEventListener('touchmove',function(e){
      if(!dragging)return;
      tgt.theta-=(e.touches[0].clientX-pm.x)*0.006;
      tgt.phi=Math.max(.3,Math.min(1.35,tgt.phi+(e.touches[0].clientY-pm.y)*0.006));
      pm={x:e.touches[0].clientX,y:e.touches[0].clientY};
    });

    // ── LIGHTS ────────────────────────────────────────────
    scene.add(new THREE.AmbientLight(0x1a3a5c,0.5));
    var moon=new THREE.DirectionalLight(0x8ab4cc,1.1);
    moon.position.set(-18,28,12); moon.castShadow=true; moon.shadow.mapSize.set(2048,2048);
    moon.shadow.camera.near=.5; moon.shadow.camera.far=100;
    moon.shadow.camera.left=-40; moon.shadow.camera.right=40;
    moon.shadow.camera.top=40; moon.shadow.camera.bottom=-40;
    scene.add(moon);
    var fl=new THREE.DirectionalLight(0x3a5a7a,0.3); fl.position.set(20,8,-10); scene.add(fl);

    // ── STARS ─────────────────────────────────────────────
    (function(){
      var n=2000, pos=new Float32Array(n*3);
      for(var i=0;i<n;i++){
        var th=Math.random()*Math.PI*2, ph=Math.acos(Math.random()*2-1), r=100+Math.random()*50;
        pos[i*3]=r*Math.sin(ph)*Math.cos(th); pos[i*3+1]=Math.abs(r*Math.cos(ph)); pos[i*3+2]=r*Math.sin(ph)*Math.sin(th);
      }
      var sg=new THREE.BufferGeometry();
      sg.setAttribute('position',new THREE.BufferAttribute(pos,3));
      scene.add(new THREE.Points(sg,new THREE.PointsMaterial({color:0xffffff,size:.28,transparent:true,opacity:.65})));
    })();

    // ── GROUND ────────────────────────────────────────────
    var gnd=new THREE.Mesh(new THREE.PlaneGeometry(90,90),new THREE.MeshLambertMaterial({color:0x050f1e}));
    gnd.rotation.x=-Math.PI/2; gnd.receiveShadow=true; scene.add(gnd);
    var grid=new THREE.GridHelper(90,90,0x0c2035,0x080e1a); grid.position.y=.02; scene.add(grid);

    // ── ROADS ─────────────────────────────────────────────
    function road(x,z,w,d){
      var m=new THREE.Mesh(new THREE.BoxGeometry(w,0.06,d),new THREE.MeshLambertMaterial({color:0x0a1d30}));
      m.position.set(x,.03,z); m.receiveShadow=true; scene.add(m);
    }
    road(-1,0,2.5,42); road(-4,-6,20,2.5); road(-4,0,20,2.5); road(-4,6,20,2.5); road(8,-3,2.5,18);
    function dashedLine(ax,az,bx,bz,segs){
      segs=segs||6;
      var dx=(bx-ax)/segs, dz=(bz-az)/segs;
      for(var i=0;i<segs;i+=2){
        var m=new THREE.Mesh(new THREE.BoxGeometry(Math.abs(dx)>.1?dx*.6:.12,0.08,Math.abs(dz)>.1?dz*.6:.12),new THREE.MeshLambertMaterial({color:0xf5da1a,transparent:true,opacity:.3}));
        m.position.set(ax+dx*(i+.5),0.06,az+dz*(i+.5)); scene.add(m);
      }
    }
    dashedLine(-1,-16,-1,16,10); dashedLine(-12,0,8,0,8);

    // ── LAMPS ─────────────────────────────────────────────
    function lamp(x,z){
      var g=new THREE.Group();
      var pole=new THREE.Mesh(new THREE.CylinderGeometry(.07,.1,4.5,8),new THREE.MeshLambertMaterial({color:0x223344}));
      pole.position.y=2.25; g.add(pole);
      var bulb=new THREE.Mesh(new THREE.SphereGeometry(.22,8,8),new THREE.MeshStandardMaterial({color:0xfff8d0,emissive:0xffc060,emissiveIntensity:2.5,roughness:.2}));
      bulb.position.y=4.6; g.add(bulb);
      var ptl=new THREE.PointLight(0xffc060,.7,9); ptl.position.y=4.6; g.add(ptl);
      g.position.set(x,0,z); scene.add(g);
    }
    [[-12,3],[-12,-3],[0,3],[0,-3],[0,-9],[0,9],[7,4],[7,-4],[-6,0],[-6,-9],[7,0]].forEach(function(p){lamp(p[0],p[1]);});

    // ── TREES ─────────────────────────────────────────────
    function tree(x,z){
      var g=new THREE.Group();
      var trunk=new THREE.Mesh(new THREE.CylinderGeometry(.1,.14,1.2,6),new THREE.MeshLambertMaterial({color:0x2a1a0a}));
      trunk.position.y=.6; g.add(trunk);
      [0,.55,1.05].forEach(function(yo,i){

      for(var i3=0;i3<SC2;i3++){
        var s2=sDat2[i3]; s2.life+=.025;
        if(s2.life>s2.ml){ s2.life=0; s2.x=sOri.x+1.5+(Math.random()-.5)*.4; s2.y=sOri.y-.5; s2.z=sOri.z+(Math.random()-.5)*.4; s2.vx=(Math.random()-.5)*.08; s2.vy=Math.random()*.1+.04; s2.vz=(Math.random()-.5)*.08; }
        s2.x+=s2.vx; s2.y+=s2.vy; s2.z+=s2.vz;
        sPos2[i3*3]=s2.x; sPos2[i3*3+1]=s2.y; sPos2[i3*3+2]=s2.z;
      }
      sg2.attributes.position.needsUpdate=true;

      for(var ki=0;ki<SMOKECOUNT;ki++){
        var sm=smokeDat[ki]; sm.life+=.006;
        if(sm.life>sm.ml){ sm.life=0; sm.x=smokeOri.x+(Math.random()-.5)*.4; sm.y=smokeOri.y; sm.z=smokeOri.z+(Math.random()-.5)*.4; }
        sm.x+=(Math.random()-.5)*.02+.006; sm.y+=.025*(1-sm.life/sm.ml*.4); sm.z+=(Math.random()-.5)*.02;
        smokePos[ki*3]=sm.x; smokePos[ki*3+1]=sm.y; smokePos[ki*3+2]=sm.z;
      }
      smokeGeo.attributes.position.needsUpdate=true;
      smokeMesh.material.size=.8+Math.sin(tick*.3)*0.4;

      workers.forEach(function(w){
        w.t+=w.speed;
        if(w.t>=1){ w.t=0; w.pi=(w.pi+1)%(w.path.length-1); }
        var ax=w.path[w.pi][0], az=w.path[w.pi][1];
        var nx=Math.min(w.pi+1,w.path.length-1);
        var bx=w.path[nx][0], bz=w.path[nx][1];
        w.mesh.position.x=ax+(bx-ax)*w.t;
        w.mesh.position.z=az+(bz-az)*w.t;
        var dx=bx-ax, dz=bz-az;
        if(Math.abs(dx)+Math.abs(dz)>.01) w.mesh.rotation.y=Math.atan2(dx,dz);
        w.mesh.position.y=Math.abs(Math.sin(w.t*Math.PI*6))*.06;
      });

      allBuildings.forEach(function(g,idx){
        g.traverse(function(c){ if(c.isPointLight) c.intensity=.5+Math.sin(tick*.8+idx)*.12; });
      });
      var adminG=buildingIndex['admin'];
      if(adminG) adminG.traverse(function(c){
        if(c.isMesh&&c.material&&c.material.emissive&&c.material.emissive.r>.5)
          c.material.emissiveIntensity=(Math.sin(tick*4)>.6)?3:0.1;
      });

      updateLabels();
      renderer.render(scene,cam);
    }
    animate();

  } // fin startApp

})();
</script>
</body>
</html>
